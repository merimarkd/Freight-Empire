<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Driver Portrait Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0c0f;font-family:'Courier New',monospace;color:#a8b4c0;padding:20px}
h2{color:#00b4dc;font-size:1rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;margin-bottom:20px}
.card{background:rgba(8,12,18,0.97);border:1px solid rgba(0,180,220,0.22);border-top:2px solid #00b4dc;padding:12px;border-radius:2px}
.card svg{display:block;margin:0 auto 10px;border-radius:4px}
.name{color:#d4e0e8;font-size:0.72rem;font-weight:700;text-align:center;margin-bottom:2px}
.meta{color:#566470;font-size:0.65rem;text-align:center;line-height:1.5}
.exp{color:#e87c2a}
button{background:#00b4dc;color:#0a0c0f;border:none;font-family:'Courier New',monospace;font-weight:700;padding:10px 24px;cursor:pointer;text-transform:uppercase;letter-spacing:0.1em;font-size:0.82rem;margin-right:10px}
button:hover{background:#00cff7}
</style>
</head>
<body>
<h2>Driver Portrait Generator</h2>
<div class="grid" id="grid"></div>
<button onclick="generate()">Generate New Drivers</button>
<button onclick="onePerShape()">One Per Head Shape</button>
<script>
const ETH=[
  {id:'white',w:62,
   skin:['#F0B882','#E8A870','#DDAA80','#EAB890','#F5C89A'],
   shadow:['#C88858','#B87040','#C09070','#C89860','#D4986A'],
   hairC:['#1C0E08','#3C2010','#6A4820','#9A7030','#C8A848','#E8D080','#777','#222'],
   mn:['James','Robert','David','Michael','William','Thomas','Gary','Dennis','Kevin','Brian','Scott','Mark','Larry','Jerry','Richard','Donald','Kenneth','Steven'],
   fn:['Linda','Patricia','Barbara','Susan','Karen','Nancy','Lisa','Betty','Ashley','Kimberly','Carol','Michelle','Amanda','Melissa','Laura','Sarah','Sharon']},
  {id:'black',w:13,
   skin:['#5C2E14','#7A4020','#3D1C0A','#6B3518','#8A5530','#4A2410'],
   shadow:['#3A1C08','#501808','#280E04','#421808','#5A3018','#2E1208'],
   hairC:['#100400','#080200','#180600','#0A0300'],
   mn:['Marcus','Darius','DeShawn','Jaylen','Malik','Terrell','Andre','Jerome','Reggie','Curtis','Antoine','Derrick','Calvin','Floyd','Leroy','Bernard','Otis'],
   fn:['Aaliyah','Keisha','Tamara','Latasha','Monique','Denise','Shanice','Tiffany','Ebony','Jasmine','Vanessa','Crystal','Tanya','Simone','Alicia','Darlene']},
  {id:'hispanic',w:18,
   skin:['#C87838','#B06830','#BE7840','#CA8848','#D09050','#A85828'],
   shadow:['#905020','#784018','#8A5828','#9A6030','#A06820','#784020'],
   hairC:['#160600','#220A04','#2C1206','#0C0200','#100400'],
   mn:['Carlos','Jose','Miguel','Juan','Luis','Antonio','Roberto','Fernando','Eduardo','Ricardo','Manuel','Pedro','Jorge','Alberto','Rafael'],
   fn:['Maria','Carmen','Rosa','Ana','Elena','Lucia','Gloria','Guadalupe','Patricia','Cristina','Veronica','Monica','Adriana','Claudia','Yolanda']},
  {id:'asian',w:7,
   skin:['#F2CE92','#E8BE7A','#E0B468','#F8D8A8','#EAC485'],
   shadow:['#C89858','#B88040','#C0A060','#D0A848','#C09860'],
   hairC:['#060200','#0A0300','#040100','#080200'],
   mn:['Wei','Jin','Hyun','Min','Kenji','Hiroshi','Nguyen','Thanh','Ravi','Raj','Mohammed','Ali','Hassan','Takeshi','Minh'],
   fn:['Li','Mei','Yuki','Hana','Anh','Thu','Priya','Anita','Fatima','Aisha','Layla','Sara','Kim','Jing','Yuna']},
];
const LNAMES={
  white:['Smith','Johnson','Williams','Brown','Jones','Miller','Davis','Wilson','Anderson','Taylor','Thomas','Harris','Martin','Robinson','Clark','Lewis','Walker'],
  black:['Washington','Jefferson','Williams','Robinson','Jackson','Brown','Davis','Harris','Thompson','Johnson','Martin','Anderson','Wilson','Thomas','Lewis'],
  hispanic:['Garcia','Martinez','Rodriguez','Lopez','Gonzalez','Hernandez','Perez','Torres','Ramirez','Flores','Rivera','Morales','Ortiz','Chavez','Ramos'],
  asian:['Nguyen','Kim','Lee','Park','Wang','Chen','Zhang','Patel','Singh','Sharma','Kumar','Tanaka','Ali','Hassan','Khan']
};

const SHAPES=[
  {n:'oval',    rx:0.38,ry:1.05,jw:0.30,jr:1.0},
  {n:'round',   rx:0.44,ry:0.90,jw:0.38,jr:1.0},
  {n:'square',  rx:0.40,ry:0.96,jw:0.40,jr:0.12},
  {n:'rect',    rx:0.33,ry:1.12,jw:0.31,jr:0.10},
  {n:'heart',   rx:0.43,ry:0.94,jw:0.17,jr:1.0},
  {n:'diamond', rx:0.36,ry:1.02,jw:0.19,jr:0.6},
  {n:'oblong',  rx:0.30,ry:1.15,jw:0.25,jr:0.9},
  {n:'wide',    rx:0.47,ry:0.86,jw:0.38,jr:0.8},
];

function sr(seed,n){
  let x=((seed*1000+n)^(n*2654435761))>>>0;
  x=((x^(x>>>16))*0x45d9f3b)>>>0;
  x=((x^(x>>>16))*0x45d9f3b)>>>0;
  return((x^(x>>>16))>>>0)/4294967296;
}
function rp(a,s,n){return a[Math.floor(sr(s,n||0)*a.length)]||a[0]}
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function pickEth(){const t=ETH.reduce((s,e)=>s+e.w,0);let r=Math.random()*t;for(const e of ETH){r-=e.w;if(r<=0)return e}return ETH[0]}

function makeDriver(forceShape){
  const eth=pickEth(),male=Math.random()>0.15;
  const exp=ri(0,25),age=21+exp+ri(0,5);
  const seed=Math.random()*1e7|0;
  const ei=Math.floor(sr(seed,3)*eth.skin.length);
  return{
    name:`${rp(male?eth.mn:eth.fn,seed,1)} ${rp(LNAMES[eth.id],seed,2)}`,
    age,exp,male,eth:eth.id,
    skin:eth.skin[ei],
    shadow:eth.shadow[ei]||eth.shadow[0],
    hair:rp(eth.hairC,seed,4),
    hs:forceShape||SHAPES[Math.floor(Math.random()*SHAPES.length)],
    seed
  };
}

const OL='#1a0a04'; // universal dark outline color

function portrait(d,S=130){
  const{skin,shadow,hair,male,age,eth,hs,seed}=d;
  const R=n=>sr(seed,n);

  const cx=S/2,cy=S/2;
  // Face block — narrower than canvas so background shows
  const fW=S*0.54, fH=fW*(hs.ry/hs.rx)*0.92;
  const hw=fW/2, hh=fH/2;
  const fcx=cx, fcy=cy+S*0.06;
  const fTop=fcy-hh, fBot=fcy+hh;
  const jawW=fW*hs.jw, jr=hs.jr;

  // Proportional landmarks (thirds of face)
  const browY=fTop+fH*0.30;
  const eyeY =fTop+fH*0.40;
  const noseBot=fTop+fH*0.62;
  const mouthY=fTop+fH*0.76;
  const chinY=fBot;

  // Eye sizing — anime/comic style: larger eyes
  const eyeW=fW*0.155, eyeH=fW*(eth==='asian'?0.085:0.115);
  const eyeSep=fW*0.115; // center-to-center separation
  const exL=fcx-eyeSep-eyeW*0.5, exR=fcx+eyeSep+eyeW*0.5;

  const nW=fW*(0.095+R(5)*0.035+(eth==='black'?0.040:eth==='hispanic'?0.018:0));
  const mW=fW*(0.175+R(8)*0.060+(eth==='black'?0.025:eth==='hispanic'?0.012:0));
  const lipH=fH*(0.025+R(9)*0.012+(eth==='black'?0.016:0));

  const wrinkle=Math.max(0,(age-38)/24);
  const bald=male&&age>46&&R(4)>0.55;
  const hairStyle=male?(R(3)>0.65?'long':'short'):(R(3)>0.35?'long':'bun');
  const hasFH=male&&R(1)>0.40;
  const fhType=R(2)>0.5?'beard':(R(2)>0.3?'mustache':'stubble');
  const glasses=R(13)>0.84;
  const hasCap=male&&R(14)>0.78;

  // Eye colors — darker, more saturated for anime look
  const eyeColorMap={
    white:['#2A4A6A','#304A30','#4A2818','#1C3050'],
    black:['#1C0C04','#140800'],
    hispanic:['#2A1408','#201008','#3A2010'],
    asian:['#100600','#0C0400','#180800']
  };
  const eyeC=(eyeColorMap[eth]||['#1C0C04'])[Math.floor(R(11)*3)%((eyeColorMap[eth]||['#1C0C04']).length)];

  // Lip color
  const lipSkin=eth==='black'?'#6A3028':eth==='hispanic'?'#A05840':'#C07868';
  const lipC=lipSkin;

  // Build face outline path
  function fPath(){
    const midY=fcy+hh*0.12;
    if(jr>0.7){
      return`M${fcx} ${fTop} C${fcx+hw*0.55} ${fTop},${fcx+hw} ${fcy-hh*0.25},${fcx+hw} ${midY} C${fcx+hw} ${fcy+hh*0.36},${fcx+jawW*1.12} ${chinY-hh*0.08*jr},${fcx+jawW*0.28} ${chinY} Q${fcx} ${chinY+hh*0.04} ${fcx-jawW*0.28} ${chinY} C${fcx-jawW*1.12} ${chinY-hh*0.08*jr},${fcx-hw} ${fcy+hh*0.36},${fcx-hw} ${midY} C${fcx-hw} ${fcy-hh*0.25},${fcx-hw*0.55} ${fTop},${fcx} ${fTop}Z`;
    }else{
      const jy=chinY-hh*0.14;
      return`M${fcx} ${fTop} C${fcx+hw*0.55} ${fTop},${fcx+hw} ${fcy-hh*0.25},${fcx+hw} ${fcy+hh*0.1} L${fcx+hw*0.95} ${jy} L${fcx+jawW} ${jy+hh*0.10} L${fcx+jawW*0.55} ${chinY} L${fcx-jawW*0.55} ${chinY} L${fcx-jawW} ${jy+hh*0.10} L${fcx-hw*0.95} ${jy} C${fcx-hw} ${fcy-hh*0.25},${fcx-hw*0.55} ${fTop},${fcx} ${fTop}Z`;
    }
  }
  const fp=fPath();

  let p=`<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">`;

  // BG
  const bgH=(seed*53)%360;
  p+=`<rect width="${S}" height="${S}" fill="#1a2235"/>`;
  p+=`<rect width="${S}" height="${S}" fill="hsl(${bgH},20%,10%)" opacity="0.6"/>`;

  // Shoulders
  const shH=(seed*37)%360;
  const shC=`hsl(${shH},35%,22%)`;
  const shDk=`hsl(${shH},35%,14%)`;
  p+=`<path d="M${cx-S*0.52} ${S} Q${cx-S*0.28} ${chinY+S*0.12} ${cx-S*0.085} ${chinY+S*0.05} L${cx+S*0.085} ${chinY+S*0.05} Q${cx+S*0.28} ${chinY+S*0.12} ${cx+S*0.52} ${S}Z" fill="${shC}" stroke="${OL}" stroke-width="1.2"/>`;
  // Collar shadow
  p+=`<path d="M${cx-S*0.085} ${chinY+S*0.05} Q${cx} ${chinY+S*0.14} ${cx+S*0.085} ${chinY+S*0.05}" fill="none" stroke="${OL}" stroke-width="0.8" opacity="0.5"/>`;

  // Neck
  const nkW=S*(male?0.088:0.068);
  p+=`<rect x="${cx-nkW}" y="${chinY-S*0.01}" width="${nkW*2}" height="${S*0.14}" rx="2" fill="${skin}" stroke="${OL}" stroke-width="1.0"/>`;
  // Neck shadow
  p+=`<rect x="${cx-nkW}" y="${chinY-S*0.01}" width="${nkW*0.4}" height="${S*0.14}" rx="2" fill="${shadow}" opacity="0.55"/>`;
  p+=`<rect x="${cx+nkW*0.6}" y="${chinY-S*0.01}" width="${nkW*0.4}" height="${S*0.14}" rx="2" fill="${shadow}" opacity="0.55"/>`;

  // ── HAIR BACK LAYER ──
  if(!bald&&!hasCap){
    const hairDk=hair;
    if(hairStyle==='long'){
      p+=`<path d="M${fcx} ${fTop-fH*0.12} C${fcx+hw*0.58} ${fTop-fH*0.14},${fcx+hw*1.18} ${fcy-hh*0.2},${fcx+hw*1.18} ${fcy+hh*0.2} L${fcx+hw*1.12} ${fBot+fH*0.08} Q${fcx} ${fBot+fH*0.14} ${fcx-hw*1.12} ${fBot+fH*0.08} L${fcx-hw*1.18} ${fcy+hh*0.2} C${fcx-hw*1.18} ${fcy-hh*0.2},${fcx-hw*0.58} ${fTop-fH*0.14},${fcx} ${fTop-fH*0.12}Z" fill="${hairDk}" stroke="${OL}" stroke-width="1.2"/>`;
    }else if(hairStyle==='bun'){
      p+=`<ellipse cx="${fcx}" cy="${fcy}" rx="${hw*1.12}" ry="${hh*1.12}" fill="${hairDk}" stroke="${OL}" stroke-width="1.2"/>`;
      p+=`<circle cx="${fcx}" cy="${fTop-fH*0.08}" r="${S*0.075}" fill="${hairDk}" stroke="${OL}" stroke-width="1.0"/>`;
    }else{
      // Short hair — small cap shape
      p+=`<path d="M${fcx} ${fTop-fH*0.08} C${fcx+hw*0.6} ${fTop-fH*0.10},${fcx+hw*1.10} ${fTop+fH*0.08},${fcx+hw*1.06} ${fTop+fH*0.22} L${fcx-hw*1.06} ${fTop+fH*0.22} C${fcx-hw*1.10} ${fTop+fH*0.08},${fcx-hw*0.6} ${fTop-fH*0.10},${fcx} ${fTop-fH*0.08}Z" fill="${hairDk}" stroke="${OL}" stroke-width="1.2"/>`;
    }
    // Black hair: curly texture bumps on silhouette
    if(eth==='black'&&hairStyle!=='long'){
      for(let ci=0;ci<10;ci++){
        const bx=fcx-hw*0.9+ci*hw*0.18;
        const by=fTop-fH*0.04+Math.sin(ci*1.2)*fH*0.03;
        p+=`<circle cx="${bx.toFixed(1)}" cy="${by.toFixed(1)}" r="${(S*0.032).toFixed(1)}" fill="${hairDk}" stroke="${OL}" stroke-width="0.8"/>`;
      }
    }
  }

  // Cap
  if(hasCap){
    const capC=`hsl(${(seed*71)%360},40%,25%)`;
    p+=`<ellipse cx="${fcx}" cy="${fTop+fH*0.05}" rx="${hw*1.12}" ry="${fH*0.18}" fill="${capC}" stroke="${OL}" stroke-width="1.2"/>`;
    p+=`<path d="M${fcx-hw*1.12} ${fTop+fH*0.05} L${fcx-hw*1.38} ${fTop+fH*0.12} Q${fcx-hw*1.30} ${fTop+fH*0.20} ${fcx-hw*1.10} ${fTop+fH*0.18}Z" fill="${capC}" stroke="${OL}" stroke-width="1.0"/>`;
    // Cap brim detail
    p+=`<line x1="${fcx-hw*0.6}" y1="${fTop+fH*0.04}" x2="${fcx+hw*0.6}" y2="${fTop+fH*0.04}" stroke="${capC==='#333'?'#555':'#ffffff22'}" stroke-width="0.8"/>`;
  }

  // Ears
  const earCY=eyeY+eyeH*0.5;
  const earW2=S*0.033, earH2=S*0.060;
  [-1,1].forEach(side=>{
    const ex2=fcx+side*(hw-earW2*0.3);
    p+=`<ellipse cx="${ex2}" cy="${earCY}" rx="${earW2}" ry="${earH2}" fill="${skin}" stroke="${OL}" stroke-width="1.1"/>`;
    p+=`<path d="M${ex2-side*earW2*0.1} ${earCY-earH2*0.4} Q${ex2+side*earW2*0.45} ${earCY} ${ex2-side*earW2*0.1} ${earCY+earH2*0.4}" stroke="${shadow}" stroke-width="0.9" fill="none"/>`;
  });

  // ── FACE ──
  p+=`<path d="${fp}" fill="${skin}" stroke="${OL}" stroke-width="1.6"/>`;

  // Face shading — side shadows (flat areas like comic)
  p+=`<clipPath id="fc${seed}"><path d="${fp}"/></clipPath>`;
  p+=`<g clip-path="url(#fc${seed})">`;
  // Side shadows
  p+=`<ellipse cx="${fcx-hw*0.75}" cy="${fcy}" rx="${hw*0.30}" ry="${hh*0.75}" fill="${shadow}" opacity="0.50"/>`;
  p+=`<ellipse cx="${fcx+hw*0.75}" cy="${fcy}" rx="${hw*0.30}" ry="${hh*0.75}" fill="${shadow}" opacity="0.50"/>`;
  // Under-chin shadow
  p+=`<ellipse cx="${fcx}" cy="${chinY-hh*0.06}" rx="${jawW*0.70}" ry="${hh*0.07}" fill="${shadow}" opacity="0.45"/>`;
  // Under-nose shadow
  p+=`<ellipse cx="${fcx}" cy="${noseBot+fH*0.025}" rx="${nW*0.90}" ry="${fH*0.022}" fill="${shadow}" opacity="0.40"/>`;
  p+=`</g>`;

  // ── HAIR FRONT ──
  if(!bald&&!hasCap){
    const hairDk=hair;
    // Hair hairline / front shape
    if(hairStyle==='long'){
      p+=`<path d="M${fcx} ${fTop} C${fcx+hw*0.55} ${fTop},${fcx+hw*1.08} ${fTop+fH*0.08},${fcx+hw*1.05} ${fTop+fH*0.20} L${fcx-hw*1.05} ${fTop+fH*0.20} C${fcx-hw*1.08} ${fTop+fH*0.08},${fcx-hw*0.55} ${fTop},${fcx} ${fTop}Z" fill="${hairDk}" stroke="${OL}" stroke-width="1.0"/>`;
      // Hair strands
      for(let si=0;si<5;si++){
        const sx=fcx-hw*0.9+si*hw*0.45;
        p+=`<path d="M${sx} ${fTop+fH*0.18} Q${sx+hw*0.06} ${fTop+fH*0.32} ${sx+hw*0.02} ${fTop+fH*0.50}" stroke="${hair==='#222'||hair==='#777'?'#555':'#00000030'}" stroke-width="0.8" fill="none" opacity="0.5"/>`;
      }
    }else if(hairStyle==='short'){
      p+=`<path d="M${fcx} ${fTop} C${fcx+hw*0.55} ${fTop},${fcx+hw*1.06} ${fTop+fH*0.06},${fcx+hw*1.04} ${fTop+fH*0.24} L${fcx-hw*1.04} ${fTop+fH*0.24} C${fcx-hw*1.06} ${fTop+fH*0.06},${fcx-hw*0.55} ${fTop},${fcx} ${fTop}Z" fill="${hairDk}" stroke="${OL}" stroke-width="1.0"/>`;
      // Short hair texture lines
      for(let si=0;si<6;si++){
        const sx=fcx-hw*0.75+si*hw*0.30;
        p+=`<line x1="${sx}" y1="${fTop+fH*0.04}" x2="${sx+hw*0.04}" y2="${fTop+fH*0.20}" stroke="${OL}" stroke-width="0.7" opacity="0.35"/>`;
      }
    }else if(hairStyle==='bun'){
      p+=`<path d="M${fcx} ${fTop} C${fcx+hw*0.55} ${fTop},${fcx+hw*1.06} ${fTop+fH*0.06},${fcx+hw*1.04} ${fTop+fH*0.20} L${fcx-hw*1.04} ${fTop+fH*0.20} C${fcx-hw*1.06} ${fTop+fH*0.06},${fcx-hw*0.55} ${fTop},${fcx} ${fTop}Z" fill="${hairDk}" stroke="${OL}" stroke-width="1.0"/>`;
    }
  }

  // ── EYEBROWS — thick, defined, comic style ──
  const browThick=male?3.2:2.2;
  const browArch=male?fH*0.008:fH*0.018;
  const browHW=eyeW*1.05;
  // Left
  p+=`<path d="M${exL-browHW} ${browY+browArch*0.5} Q${exL} ${browY-browArch} ${exL+browHW} ${browY+browArch*0.1}" stroke="${hair}" stroke-width="${browThick}" fill="none" stroke-linecap="round"/>`;
  p+=`<path d="M${exL-browHW} ${browY+browArch*0.5} Q${exL} ${browY-browArch} ${exL+browHW} ${browY+browArch*0.1}" stroke="${OL}" stroke-width="${browThick+0.8}" fill="none" stroke-linecap="round" opacity="0.3"/>`;
  // Right
  p+=`<path d="M${exR-browHW} ${browY+browArch*0.1} Q${exR} ${browY-browArch} ${exR+browHW} ${browY+browArch*0.5}" stroke="${hair}" stroke-width="${browThick}" fill="none" stroke-linecap="round"/>`;
  p+=`<path d="M${exR-browHW} ${browY+browArch*0.1} Q${exR} ${browY-browArch} ${exR+browHW} ${browY+browArch*0.5}" stroke="${OL}" stroke-width="${browThick+0.8}" fill="none" stroke-linecap="round" opacity="0.3"/>`;

  // Wrinkles
  if(wrinkle>0.15){
    const wa=Math.min(0.55,wrinkle*0.75);
    const nl=Math.min(3,Math.ceil(wrinkle*3));
    for(let i=0;i<nl;i++){
      const wy=browY-fH*0.06-i*fH*0.05;
      p+=`<path d="M${fcx-hw*0.38+i*hw*0.04} ${wy} Q${fcx} ${wy-fH*0.007} ${fcx+hw*0.38-i*hw*0.04} ${wy}" stroke="${shadow}" stroke-width="1.0" fill="none" opacity="${wa*(0.50-i*0.10)}"/>`;
    }
    if(wrinkle>0.3){
      // Nasolabial
      const nlY=noseBot-fH*0.01;
      p+=`<path d="M${fcx-nW*1.5} ${nlY} Q${fcx-nW*1.8} ${nlY+fH*0.038} ${fcx-nW*1.5} ${nlY+fH*0.085}" stroke="${shadow}" stroke-width="1.1" fill="none" opacity="${wa*0.45}"/>`;
      p+=`<path d="M${fcx+nW*1.5} ${nlY} Q${fcx+nW*1.8} ${nlY+fH*0.038} ${fcx+nW*1.5} ${nlY+fH*0.085}" stroke="${shadow}" stroke-width="1.1" fill="none" opacity="${wa*0.45}"/>`;
    }
  }

  // ── EYES — large, anime/comic style ──
  [exL,exR].forEach(ex=>{
    const isAsian=eth==='asian';
    const eW=eyeW*(isAsian?1.05:1.0);
    const eH=eyeH*(isAsian?0.75:1.0);
    const ir=Math.min(eW*0.78,eH*1.1);

    // Eye whites with outline
    p+=`<ellipse cx="${ex}" cy="${eyeY}" rx="${eW}" ry="${eH}" fill="#F0EAE0" stroke="${OL}" stroke-width="1.2"/>`;

    // Asian epicanthal fold
    if(isAsian){
      const side=ex<fcx?1:-1;
      p+=`<path d="M${ex+side*eW*0.88} ${eyeY-eH*0.5} Q${ex+side*eW*1.05} ${eyeY-eH*0.1} ${ex+side*eW*0.88} ${eyeY+eH*0.4}" stroke="${skin}" stroke-width="${eW*0.4}" fill="none"/>`;
    }

    // Iris
    p+=`<circle cx="${ex}" cy="${eyeY}" r="${ir}" fill="${eyeC}"/>`;
    // Iris highlight ring
    p+=`<circle cx="${ex}" cy="${eyeY}" r="${ir*0.68}" fill="${eyeC}" opacity="0.6"/>`;
    // Pupil
    p+=`<circle cx="${ex}" cy="${eyeY}" r="${ir*0.50}" fill="#080300"/>`;
    // Catchlight — anime style (large)
    p+=`<ellipse cx="${ex+ir*0.26}" cy="${eyeY-ir*0.28}" rx="${ir*0.22}" ry="${ir*0.20}" fill="white" opacity="0.95"/>`;
    p+=`<circle cx="${ex-ir*0.18}" cy="${eyeY+ir*0.22}" r="${ir*0.10}" fill="white" opacity="0.55"/>`;

    // THICK upper lash line — key for anime look
    p+=`<path d="M${ex-eW*0.98} ${eyeY-eH*0.05} Q${ex} ${eyeY-eH*1.55} ${ex+eW*0.98} ${eyeY-eH*0.05}" stroke="${OL}" stroke-width="${male?2.2:3.0}" fill="none" stroke-linecap="round"/>`;
    // Lower lash line (thinner)
    p+=`<path d="M${ex-eW*0.88} ${eyeY+eH*0.30} Q${ex} ${eyeY+eH*0.88} ${ex+eW*0.88} ${eyeY+eH*0.30}" stroke="${OL}" stroke-width="${male?1.0:1.4}" fill="none" opacity="0.65"/>`;

    // Female: extra lash flicks
    if(!male){
      p+=`<line x1="${ex+eW*0.90}" y1="${eyeY-eH*0.10}" x2="${ex+eW*1.08}" y2="${eyeY-eH*0.60}" stroke="${OL}" stroke-width="1.4" stroke-linecap="round"/>`;
      p+=`<line x1="${ex+eW*0.70}" y1="${eyeY-eH*0.30}" x2="${ex+eW*0.82}" y2="${eyeY-eH*0.80}" stroke="${OL}" stroke-width="0.9" stroke-linecap="round"/>`;
    }
  });

  // Glasses
  if(glasses){
    const gR=eyeW+S*0.014;
    const gC=R(14)>0.5?'#222':'#6A4810';
    p+=`<circle cx="${exL}" cy="${eyeY}" r="${gR}" fill="none" stroke="${gC}" stroke-width="1.8"/>`;
    p+=`<circle cx="${exR}" cy="${eyeY}" r="${gR}" fill="none" stroke="${gC}" stroke-width="1.8"/>`;
    p+=`<line x1="${exL+gR}" y1="${eyeY}" x2="${exR-gR}" y2="${eyeY}" stroke="${gC}" stroke-width="1.5"/>`;
    p+=`<line x1="${exL-gR}" y1="${eyeY}" x2="${fcx-hw*0.90}" y2="${eyeY}" stroke="${gC}" stroke-width="1.5"/>`;
    p+=`<line x1="${exR+gR}" y1="${eyeY}" x2="${fcx+hw*0.90}" y2="${eyeY}" stroke="${gC}" stroke-width="1.5"/>`;
  }

  // ── NOSE — defined with outline, bridge visible ──
  const nbY=eyeY+eyeH+fH*0.02;
  // Bridge lines (visible, comic style)
  p+=`<path d="M${fcx-fW*0.028} ${nbY} Q${fcx-nW*0.55} ${noseBot-fH*0.04} ${fcx-nW*0.75} ${noseBot}" stroke="${OL}" stroke-width="1.1" fill="none" opacity="0.75"/>`;
  p+=`<path d="M${fcx+fW*0.028} ${nbY} Q${fcx+nW*0.55} ${noseBot-fH*0.04} ${fcx+nW*0.75} ${noseBot}" stroke="${OL}" stroke-width="1.1" fill="none" opacity="0.75"/>`;
  // Nose tip (small outlined shape)
  p+=`<path d="M${fcx-nW*0.78} ${noseBot} Q${fcx} ${noseBot+nW*0.4} ${fcx+nW*0.78} ${noseBot}" stroke="${OL}" stroke-width="1.2" fill="none"/>`;
  // Nostril circles
  p+=`<circle cx="${fcx-nW*0.52}" cy="${noseBot+nW*0.08}" r="${nW*0.24}" fill="${shadow}" stroke="${OL}" stroke-width="0.8" opacity="0.75"/>`;
  p+=`<circle cx="${fcx+nW*0.52}" cy="${noseBot+nW*0.08}" r="${nW*0.24}" fill="${shadow}" stroke="${OL}" stroke-width="0.8" opacity="0.75"/>`;
  // Nose highlight
  p+=`<ellipse cx="${fcx}" cy="${noseBot-nW*0.15}" rx="${nW*0.22}" ry="${nW*0.18}" fill="white" opacity="0.20"/>`;

  // ── MOUTH — comic style defined lips ──
  const mpk=fH*0.018;
  // Upper lip
  p+=`<path d="M${fcx-mW} ${mouthY} Q${fcx-mW*0.52} ${mouthY-lipH*0.5} ${fcx-mW*0.18} ${mouthY-mpk*0.4} Q${fcx} ${mouthY-mpk} ${fcx+mW*0.18} ${mouthY-mpk*0.4} Q${fcx+mW*0.52} ${mouthY-lipH*0.5} ${fcx+mW} ${mouthY}" fill="${lipC}" stroke="${OL}" stroke-width="1.1"/>`;
  // Lower lip
  p+=`<path d="M${fcx-mW} ${mouthY} Q${fcx-mW*0.28} ${mouthY+lipH*2.3} ${fcx} ${mouthY+lipH*2.5} Q${fcx+mW*0.28} ${mouthY+lipH*2.3} ${fcx+mW} ${mouthY}" fill="${lipC}" stroke="${OL}" stroke-width="1.1"/>`;
  // Lighter lower lip center
  p+=`<ellipse cx="${fcx}" cy="${mouthY+lipH*1.6}" rx="${mW*0.38}" ry="${lipH*0.6}" fill="white" opacity="0.18"/>`;
  // Mouth line
  p+=`<path d="M${fcx-mW*0.88} ${mouthY} Q${fcx} ${mouthY+lipH*0.5} ${fcx+mW*0.88} ${mouthY}" stroke="${OL}" stroke-width="1.2" fill="none"/>`;

  // ── FACIAL HAIR ──
  if(hasFH){
    const fhC=hair;
    if(fhType==='beard'){
      p+=`<path d="M${fcx-mW*1.1} ${mouthY+fH*0.01} C${fcx-mW*1.3} ${mouthY+fH*0.06} ${fcx-jawW*1.0} ${chinY-fH*0.06} ${fcx-jawW*0.32} ${chinY} Q${fcx} ${chinY+fH*0.04} ${fcx+jawW*0.32} ${chinY} C${fcx+jawW*1.0} ${chinY-fH*0.06} ${fcx+mW*1.3} ${mouthY+fH*0.06} ${fcx+mW*1.1} ${mouthY+fH*0.01}Z" fill="${fhC}" stroke="${OL}" stroke-width="0.9" opacity="0.82"/>`;
      p+=`<path d="M${fcx-mW*1.06} ${mouthY-fH*0.014} Q${fcx-mW*0.5} ${mouthY-fH*0.038} ${fcx} ${mouthY-fH*0.022} Q${fcx+mW*0.5} ${mouthY-fH*0.038} ${fcx+mW*1.06} ${mouthY-fH*0.014}" stroke="${fhC}" stroke-width="4.2" fill="none" stroke-linecap="round" opacity="0.88"/>`;
    }else if(fhType==='mustache'){
      p+=`<path d="M${fcx-mW*1.06} ${mouthY-fH*0.014} Q${fcx-mW*0.5} ${mouthY-fH*0.042} ${fcx} ${mouthY-fH*0.024} Q${fcx+mW*0.5} ${mouthY-fH*0.042} ${fcx+mW*1.06} ${mouthY-fH*0.014}" stroke="${fhC}" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.85"/>`;
    }else{
      // 5 o'clock shadow — stipple
      for(let i=0;i<30;i++){
        const sx=fcx+(R(10+i)-0.5)*jawW*2.1;
        const sy=mouthY+fH*(0.01+R(30+i)*0.14);
        const inF=sy<chinY+fH*0.02&&Math.abs(sx-fcx)<Math.max(jawW,fW*0.18)*1.15;
        if(inF)p+=`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${(0.8+R(50+i)*0.55).toFixed(1)}" fill="${fhC}" opacity="${(0.32+R(60+i)*0.30).toFixed(2)}"/>`;
      }
    }
  }

  p+=`</svg>`;
  return p;
}

function el(e){return e===0?'CDL':e===1?'1 yr':`${e} yrs`}
function generate(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let i=0;i<12;i++){
    const d=makeDriver(),c=document.createElement('div');c.className='card';
    c.innerHTML=`${portrait(d,130)}<div class="name">${d.name}</div><div class="meta">Age ${d.age} · ${d.male?'M':'F'}<br><span class="exp">${el(d.exp)} exp</span></div>`;
    g.appendChild(c);
  }
}
function onePerShape(){
  const g=document.getElementById('grid');g.innerHTML='';
  SHAPES.forEach(hs=>{
    const d=makeDriver(hs),c=document.createElement('div');c.className='card';
    c.innerHTML=`${portrait(d,130)}<div class="name">${d.name}</div><div class="meta">Age ${d.age} · ${d.male?'M':'F'} · ${hs.n}</div>`;
    g.appendChild(c);
  });
}
generate();
</script>
