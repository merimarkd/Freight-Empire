<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freight Empire</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1b2a 100%);
      color: #c9d1d9;
      overflow: hidden;
      min-height: 100vh;
    }
    .grid { position: fixed; width: 100%; height: 100%; background-image: linear-gradient(rgba(88,166,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(88,166,255,0.05) 1px, transparent 1px); background-size: 50px 50px; z-index: 0; opacity: 0.3; }
    .glow { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(88,166,255,0.1), transparent); border-radius: 50%; filter: blur(80px); z-index: 0; }
    .glow1 { top: -200px; right: -200px; }
    .glow2 { bottom: -200px; left: -200px; }
    .container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
    .box {
      background: linear-gradient(135deg, rgba(13,17,23,0.95) 0%, rgba(22,27,34,0.95) 100%);
      border: 1px solid rgba(88,166,255,0.2);
      border-radius: 8px;
      padding: 60px 50px;
      width: 90%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(88,166,255,0.1);
      backdrop-filter: blur(10px);
    }
    h1 { font-size: 2.2rem; color: #58a6ff; margin-bottom: 8px; font-weight: 400; letter-spacing: 1px; }
    p { color: #8b949e; font-size: 0.85rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
    label { display: block; color: #58a6ff; font-size: 0.8rem; margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    input { 
      width: 100%; 
      padding: 12px 14px; 
      margin-bottom: 20px; 
      background: rgba(88,166,255,0.02); 
      border: 1px solid rgba(88,166,255,0.15); 
      color: #c9d1d9; 
      border-radius: 6px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s;
    }
    input::placeholder { color: rgba(139,148,158,0.6); }
    input:focus { 
      outline: none; 
      border-color: rgba(88,166,255,0.4);
      background: rgba(88,166,255,0.05);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.1);
    }
    button { 
      width: 100%; 
      padding: 12px 16px; 
      background: linear-gradient(135deg, #1f6feb 0%, #388bfd 100%);
      color: #ffffff; 
      border: 1px solid rgba(88,166,255,0.3);
      border-radius: 6px; 
      font-weight: 600; 
      cursor: pointer; 
      text-transform: uppercase; 
      font-size: 0.9rem;
      letter-spacing: 1px;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(31,111,235,0.3);
    }
    button:hover { 
      background: linear-gradient(135deg, #388bfd 0%, #1f6feb 100%);
      box-shadow: 0 6px 20px rgba(88,166,255,0.4);
      transform: translateY(-2px);
    }
    button:active { transform: translateY(0); }
    button:disabled { 
      background: #30363d;
      color: #6e7681;
      cursor: not-allowed; 
      box-shadow: none;
    }
    .link { 
      text-align: center; 
      margin-top: 24px; 
      font-size: 0.85rem; 
      color: #8b949e;
    }
    .link a { 
      color: #58a6ff; 
      cursor: pointer; 
      text-decoration: none; 
      font-weight: 500;
      transition: color 0.3s;
    }
    .link a:hover { color: #79c0ff; }
  </style>
</head>
<body>
<div class="grid"></div>
<div class="glow glow1"></div>
<div class="glow glow2"></div>
<div class="container">
  <div class="box">
    <h1>FREIGHT EMPIRE</h1>
    <p>Persistent Trucking MMO</p>
    <label>Email Address</label>
    <input type="email" id="email" placeholder="your@email.com">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••">
    <button onclick="alert('Login coming soon')">LOGIN</button>
    <div class="link">New player? <a onclick="alert('Create account coming soon')">Register here</a></div>
  </div>
</div>
</body>
</html>
